# Produção (VPS). A API NÃO expõe porta ao host — só o Caddy (80/443) a alcança
# pela rede interna. Banco é o Neon (externo, via DATABASE_URL no .env).
#
# Uso na VPS:
#   docker compose pull && docker compose up -d
#
# Variáveis lidas do arquivo .env (ver .env.example): API_IMAGE, DOMAIN, DATABASE_URL,
# DIRECT_DATABASE_URL, JWT_SECRET, CORS_ORIGIN, etc.

services:
  api:
    image: ${API_IMAGE:-ghcr.io/CHANGE_ME/agendamento-api:latest}
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3000/health/live').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    expose:
      - "3000"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  redisdata:
  caddy_data:
  caddy_config:
